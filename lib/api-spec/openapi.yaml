components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── AUTH ──────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    # ── USERS ──────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [management, sales, accounts, operations]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [management, sales, accounts, operations]
        phone:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [management, sales, accounts, operations]
        phone:
          type: string
        isActive:
          type: boolean

    # ── CLIENTS / CRM ──────────────────────────────────────────────
    Client:
      type: object
      required: [id, name, email, phone, country, leadStatus, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsapp:
          type: ["string", "null"]
        country:
          type: string
        city:
          type: ["string", "null"]
        leadStatus:
          type: string
          enum: [new, contacted, qualified, proposal, negotiation, won, lost]
        assignedTo:
          type: ["integer", "null"]
        assignedToName:
          type: ["string", "null"]
        totalBookings:
          type: integer
        createdAt:
          type: string

    ClientDetail:
      type: object
      required: [id, name, email, phone, country, leadStatus, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsapp:
          type: ["string", "null"]
        country:
          type: string
        city:
          type: ["string", "null"]
        leadStatus:
          type: string
        assignedTo:
          type: ["integer", "null"]
        assignedToName:
          type: ["string", "null"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/ClientNote"
        followUps:
          type: array
          items:
            $ref: "#/components/schemas/FollowUp"
        quotations:
          type: array
          items:
            $ref: "#/components/schemas/Quotation"
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, email, phone, country]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        country:
          type: string
        city:
          type: string
        leadStatus:
          type: string
          enum: [new, contacted, qualified, proposal, negotiation, won, lost]
        assignedTo:
          type: integer

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        country:
          type: string
        city:
          type: string
        leadStatus:
          type: string
        assignedTo:
          type: integer

    ClientNote:
      type: object
      required: [id, clientId, content, createdBy, createdByName, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        content:
          type: string
        createdBy:
          type: integer
        createdByName:
          type: string
        createdAt:
          type: string

    ClientNoteInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    FollowUp:
      type: object
      required: [id, clientId, clientName, dueDate, type, status, assignedTo, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        dueDate:
          type: string
        type:
          type: string
          enum: [call, email, whatsapp, meeting]
        status:
          type: string
          enum: [pending, completed, cancelled]
        notes:
          type: ["string", "null"]
        assignedTo:
          type: integer
        assignedToName:
          type: ["string", "null"]
        createdAt:
          type: string

    FollowUpInput:
      type: object
      required: [dueDate, type, assignedTo]
      properties:
        dueDate:
          type: string
        type:
          type: string
          enum: [call, email, whatsapp, meeting]
        notes:
          type: string
        assignedTo:
          type: integer

