          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HotelRequest"
    post:
      operationId: createHotelRequest
      tags: [hotelRequests]
      summary: Create hotel request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelRequest"

  /hotel-requests/{id}:
    get:
      operationId: getHotelRequest
      tags: [hotelRequests]
      summary: Get hotel request with vendor quotes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelRequestDetail"
    patch:
      operationId: updateHotelRequest
      tags: [hotelRequests]
      summary: Update hotel request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelRequestUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelRequest"

  /hotel-requests/{id}/quotes:
    post:
      operationId: addVendorQuote
      tags: [hotelRequests]
      summary: Add vendor quote to hotel request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorQuoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorQuote"

  /hotel-requests/{id}/quotes/{quoteId}/select:
    patch:
      operationId: selectVendorQuote
      tags: [hotelRequests]
      summary: Mark vendor quote as selected
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorQuote"

  # ── VENDORS ────────────────────────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
