          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationItem"
    delete:
      operationId: deleteQuotationItem
      tags: [quotations]
      summary: Delete quotation item
      parameters:
        - name: id
          in: path
          required: true
