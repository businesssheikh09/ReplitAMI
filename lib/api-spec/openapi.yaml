        stars:
          type: integer
        distanceFromHaram:
          type: string
        roomTypes:
          type: array
          items:
            type: string
        mealPlans:
          type: array
          items:
            type: string
        notes:
          type: string
        imageUrl:
          type: string

    HotelUpdate:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        stars:
          type: integer
        distanceFromHaram:
          type: string
        roomTypes:
          type: array
