              schema:
                $ref: "#/components/schemas/MessageResponse"

  /quotations/{id}/send:
    post:
      operationId: sendQuotation
      tags: [quotations]
      summary: Mark quotation as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  # ── TRANSPORT ─────────────────────────────────────────────────────
  /transport:
    get:
      operationId: listTransportBookings
      tags: [transport]
      summary: List transport bookings
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
